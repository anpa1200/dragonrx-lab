---
# Operation DragonRx — Full Lab Deploy
# Usage: ansible-playbook ansible/playbooks/deploy.yml
# Run after: docker compose up -d && vagrant up

- name: "Phase 1 — Verify Docker services healthy"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Wait for Wazuh manager API
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 55000
        timeout: 120

    - name: Wait for Kibana (implicitly confirms Elasticsearch)
      ansible.builtin.uri:
        url: http://localhost:5601/api/status
        status_code: 200
      register: kibana_health
      until: kibana_health.status == 200
      retries: 30
      delay: 10

- name: "Phase 2 — Configure DC01 (Active Directory)"
  hosts: dc01
  gather_facts: true
  pre_tasks:
    - name: Set computer name to DC01
      ansible.windows.win_hostname:
        name: DC01
      register: dc01_name
    - name: Reboot if hostname changed
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 60
        connect_timeout: 30
      when: dc01_name.reboot_required
    - name: Wait for WinRM TCP after hostname reboot
      ansible.builtin.wait_for_connection:
        delay: 30
        timeout: 300
        sleep: 15
        connect_timeout: 30
      when: dc01_name.reboot_required
    - name: Verify WinRM can execute tasks (retries until stable)
      ansible.windows.win_ping:
      register: _ping
      until: _ping is not failed
      retries: 12
      delay: 15
      when: dc01_name.reboot_required
    - name: Warm up PowerShell runspace after reboot
      ansible.windows.win_shell: echo ready
      args:
        executable: powershell
      retries: 5
      delay: 15
      register: _warmup
      until: _warmup is not failed
      when: dc01_name.reboot_required
  roles:
    - dc01
    - wazuh_agent

- name: "Phase 3 — Configure FS01 (File Server)"
  hosts: fs01
  gather_facts: true
  pre_tasks:
    - name: Set computer name to FS01
      ansible.windows.win_hostname:
        name: FS01
      register: fs01_name
    - name: Reboot if hostname changed
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 60
        connect_timeout: 30
      when: fs01_name.reboot_required
    - name: Wait for WinRM TCP after hostname reboot
      ansible.builtin.wait_for_connection:
        delay: 30
        timeout: 300
        sleep: 15
        connect_timeout: 30
      when: fs01_name.reboot_required
    - name: Verify WinRM can execute tasks (retries until stable)
      ansible.windows.win_ping:
      register: _ping
      until: _ping is not failed
      retries: 12
      delay: 15
      when: fs01_name.reboot_required
    - name: Warm up PowerShell runspace after reboot
      ansible.windows.win_shell: echo ready
      args:
        executable: powershell
      retries: 5
      delay: 15
      register: _warmup
      until: _warmup is not failed
      when: fs01_name.reboot_required
  roles:
    - fs01
    - wazuh_agent

- name: "Phase 4 — Configure WS01 (Workstation)"
  hosts: ws01
  gather_facts: false
  pre_tasks:
    - name: Wait for WS01 WinRM (may be booting after offline Defender VMDK edit)
      ansible.builtin.wait_for_connection:
        delay: 15
        timeout: 600
        sleep: 15
        connect_timeout: 30
    - name: Gather facts after WinRM is up
      ansible.builtin.setup:
    - name: Set computer name to WS01
      ansible.windows.win_hostname:
        name: WS01
      register: ws01_name
    - name: Reboot if hostname changed
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 60
        connect_timeout: 30
      when: ws01_name.reboot_required
    - name: Wait for WinRM TCP after hostname reboot
      ansible.builtin.wait_for_connection:
        delay: 30
        timeout: 300
        sleep: 15
        connect_timeout: 30
      when: ws01_name.reboot_required
    - name: Verify WinRM can execute tasks (retries until stable)
      ansible.windows.win_ping:
      register: _ping
      until: _ping is not failed
      retries: 12
      delay: 15
      when: ws01_name.reboot_required
    - name: Warm up PowerShell runspace after reboot
      ansible.windows.win_shell: echo ready
      args:
        executable: powershell
      retries: 5
      delay: 15
      register: _warmup
      until: _warmup is not failed
      when: ws01_name.reboot_required
  roles:
    - ws01
    - wazuh_agent

- name: "Phase 5 — Configure SIEM indexes"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create Kibana index pattern for Wazuh
      ansible.builtin.uri:
        url: http://localhost:5601/api/saved_objects/index-pattern
        method: POST
        headers:
          Content-Type: application/json
          kbn-xsrf: "true"
        body_format: json
        body:
          attributes:
            title: "wazuh-alerts-*"
            timeFieldName: "@timestamp"
        status_code: [200, 409]

    - name: Create Kibana index pattern for Zeek
      ansible.builtin.uri:
        url: http://localhost:5601/api/saved_objects/index-pattern
        method: POST
        headers:
          Content-Type: application/json
          kbn-xsrf: "true"
        body_format: json
        body:
          attributes:
            title: "zeek-*"
            timeFieldName: "@timestamp"
        status_code: [200, 409]

- name: "Phase 6 — Run smoke tests"
  import_playbook: test.yml
