---
# Operation DragonRx — Full Lab Deploy
# Usage: ansible-playbook ansible/playbooks/deploy.yml
# Run after: docker compose up -d && vagrant up

- name: "Phase 1 — Verify Docker services healthy"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Wait for Wazuh manager API
      ansible.builtin.wait_for:
        host: 192.168.10.200
        port: 55000
        timeout: 120

    - name: Wait for Elasticsearch
      ansible.builtin.uri:
        url: http://192.168.10.202:9200/_cluster/health
        status_code: 200
      register: elastic_health
      until: elastic_health.json.status != "red"
      retries: 20
      delay: 10

    - name: Wait for Kibana
      ansible.builtin.uri:
        url: http://192.168.10.203:5601/api/status
        status_code: 200
      register: kibana_health
      until: kibana_health.status == 200
      retries: 20
      delay: 10

- name: "Phase 2 — Configure DC01 (Active Directory)"
  hosts: dc01
  gather_facts: true
  roles:
    - dc01
    - sysmon
    - wazuh_agent

- name: "Phase 3 — Configure FS01 (File Server)"
  hosts: fs01
  gather_facts: true
  roles:
    - fs01
    - sysmon
    - wazuh_agent

- name: "Phase 4 — Configure WS01 (Workstation)"
  hosts: ws01
  gather_facts: true
  roles:
    - ws01
    - sysmon
    - wazuh_agent

- name: "Phase 5 — Configure SIEM indexes"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create Kibana index pattern for Wazuh
      ansible.builtin.uri:
        url: http://192.168.10.203:5601/api/saved_objects/index-pattern
        method: POST
        headers:
          Content-Type: application/json
          kbn-xsrf: "true"
        body_format: json
        body:
          attributes:
            title: "wazuh-alerts-*"
            timeFieldName: "@timestamp"
        status_code: [200, 409]

    - name: Create Kibana index pattern for Zeek
      ansible.builtin.uri:
        url: http://192.168.10.203:5601/api/saved_objects/index-pattern
        method: POST
        headers:
          Content-Type: application/json
          kbn-xsrf: "true"
        body_format: json
        body:
          attributes:
            title: "zeek-*"
            timeFieldName: "@timestamp"
        status_code: [200, 409]

- name: "Phase 6 — Run smoke tests"
  import_playbook: test.yml
